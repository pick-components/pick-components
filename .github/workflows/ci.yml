name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify-node:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Guardrails
        run: npm run pretest

      - name: Lint
        run: npm run lint

      - name: Build release artifacts
        run: npm run build:release

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        project:
          - unit
          - integration
          - browser
          - compat

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        if: matrix.project == 'browser' || matrix.project == 'compat'
        run: npx playwright install --with-deps chromium

      - name: Install bun (compat only)
        if: matrix.project == 'compat'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run ${{ matrix.project }} tests
        run: npm run test:${{ matrix.project }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7
