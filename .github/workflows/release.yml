name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  verify-node:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(npm pkg get version | tr -d '"')"

          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Guardrails
        run: npm run pretest

      - name: Lint
        run: npm run lint

      - name: Build release artifacts
        run: npm run build:release

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        project:
          - unit
          - integration
          - browser

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        if: matrix.project == 'browser'
        run: npx playwright install --with-deps chromium

      - name: Run ${{ matrix.project }} tests
        run: npm run test:${{ matrix.project }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - verify-node
      - test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(npm pkg get version | tr -d '"')"

          if [[ "$TAG_VERSION" != "$PACKAGE_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run build:release

      - name: Publish package to npm
        shell: bash
        run: |
          PACKAGE_VERSION="$(npm pkg get version | tr -d '"')"

          if [[ "$PACKAGE_VERSION" == *-* ]]; then
            DIST_TAG="rc"
          else
            DIST_TAG="latest"
          fi

          echo "Publishing $PACKAGE_VERSION to npm with dist-tag '$DIST_TAG'."
          npm publish --access public --provenance --tag "$DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .release-artifacts/${{ github.ref_name }}/pick-components.js
            .release-artifacts/${{ github.ref_name }}/pick-components.js.map
            .release-artifacts/${{ github.ref_name }}/pick-components.min.js
            .release-artifacts/${{ github.ref_name }}/pick-components.min.js.map
            .release-artifacts/${{ github.ref_name }}/pick-components-bootstrap.js
            .release-artifacts/${{ github.ref_name }}/pick-components-bootstrap.js.map
            .release-artifacts/${{ github.ref_name }}/pick-components-bootstrap.min.js
            .release-artifacts/${{ github.ref_name }}/pick-components-bootstrap.min.js.map
            .release-artifacts/${{ github.ref_name }}/SHA256SUMS
            .release-artifacts/${{ github.ref_name }}/README.txt
            .release-artifacts/${{ github.ref_name }}/LICENSE
